name: filedrop
description: Filedrop — LAN file transfer, chat & calls (Android)
publish_to: "none"
# versionName + versionCode. BUMP THE +N (versionCode) every release or Android
# refuses to install the update over the existing app.
version: 1.7.0+15

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  basic_utils: ^5.7.0 # self-signed TLS cert generation
  pointycastle: ^3.9.1 # RSA key types used with basic_utils
  crypto: ^3.0.3 # sha-256 fingerprints (matches the desktop)
  path: ^1.9.0
  shared_preferences: ^2.2.3 # persist identity + saved peers
  path_provider: ^2.1.3 # storage dirs
  file_picker: ^8.1.2 # pick files to send
  permission_handler: ^11.3.1 # runtime permissions
  flutter_webrtc: ^0.12.5 # voice/video calls
  open_filex: ^4.5.0 # launch the APK installer for in-app updates
  uuid: ^4.4.2
  flutter_callkit_incoming: ^2.5.0 # native ringing call screen (lock screen + ring + vibrate)
  firebase_core: ^3.6.0 # FCM push so calls/messages wake a fully-closed app
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
