name: Android APK

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android SDK 36
        run: |
          (command -v sdkmanager >/dev/null && sdkmanager "platforms;android-36") \
            || "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" \
            || "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"

      - name: Scaffold Android project + build APK
        run: |
          set -e
          flutter create --org dev.filedrop --project-name filedrop --platforms=android _app
          rm -rf _app/lib
          cp -r mobile/lib _app/lib
          cp mobile/pubspec.yaml _app/pubspec.yaml
          cp mobile/android-overlay/AndroidManifest.xml _app/android/app/src/main/AndroidManifest.xml
          mkdir -p _app/android/app/src/main/kotlin/dev/filedrop/filedrop
          cp mobile/android-overlay/MainActivity.kt _app/android/app/src/main/kotlin/dev/filedrop/filedrop/MainActivity.kt
          cp mobile/android-overlay/CallForegroundService.kt _app/android/app/src/main/kotlin/dev/filedrop/filedrop/CallForegroundService.kt
          # Firebase/FCM: client config + the google-services gradle plugin
          cp mobile/android-overlay/google-services.json _app/android/app/google-services.json
          sed -i '/id("org.jetbrains.kotlin.android")/a\    id("com.google.gms.google-services") version "4.4.2" apply false' _app/android/settings.gradle.kts
          sed -i '/id("com.android.application")/a\    id("com.google.gms.google-services")' _app/android/app/build.gradle.kts
          # a Flutter plugin requires compileSdk 36 — set it on the app and,
          # via the root override, on every plugin module too.
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' _app/android/app/build.gradle.kts
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' _app/android/app/build.gradle.kts
          cat mobile/android-overlay/compilesdk-override.gradle.kts >> _app/android/build.gradle.kts
          cd _app
          flutter pub get
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk "$GITHUB_WORKSPACE/Filedrop.apk"

      # CI only validates that the build compiles. The published APK comes from
      # the maintainer's local build so the app-update signing key stays
      # consistent (a CI-signed APK has a different key and breaks updates).
      - uses: actions/upload-artifact@v4
        with:
          name: Filedrop-apk
          path: Filedrop.apk
